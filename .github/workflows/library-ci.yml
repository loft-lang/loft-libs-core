# PKG.REG library CI — every package in this chunk runs:
#   1. loft test (interpreter)
#   2. loft --native test (native codegen)
#   3. leak gate
# Template per loft's lib_plans/12-library-extraction Phase 4.
# Customise the package matrix as the chunk grows.

name: library-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - crypto
          # add arguments / random / etc. as they land
    steps:
      - uses: actions/checkout@v4

      - name: Install loft
        # TODO: replace with `loft install` of the released loft binary
        # once registry-binary support lands (PKG.REG R10).  For now this
        # builds loft from source.
        run: |
          git clone --depth=1 https://github.com/jjstwerff/loft.git /tmp/loft
          (cd /tmp/loft && cargo build --release)
          echo "/tmp/loft/target/release" >> $GITHUB_PATH

      - name: Interpreter — loft test
        working-directory: ${{ matrix.package }}
        run: loft test

      - name: Native — loft --native test
        working-directory: ${{ matrix.package }}
        run: loft --native test

      # Leak gate stub — wire up once leak.rs is exposed as a
      # cross-package gate; today it's monorepo-internal.
      # - name: Leak gate
      #   working-directory: ${{ matrix.package }}
      #   run: loft test --leak-check
