# PKG.REG library CI — canonical workflow shipped 2026-05-24 evening
# as plan-12 Phase 6.5.  Every package in this chunk runs:
#   1. loft test            — interpreter end-to-end
#   2. loft --native test   — native codegen end-to-end
#
# Until a public loft binary release exists we build loft from
# source on the runner.  The .cargo/config.toml in the loft repo
# forces -fuse-ld=mold, so we apt-get mold first; without it, cc
# can't find a linker and even the proc-macro2 build script fails.
#
# Cached on the loft.git HEAD SHA so repeat runs reuse the binary.

name: library-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - crypto
          - arguments
          - random
    steps:
      - uses: actions/checkout@v4

      - name: Install mold (loft's pinned linker)
        run: |
          sudo apt-get update
          sudo apt-get install -y mold

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-loft-v1

      - name: Build loft from source
        run: |
          git clone --depth=1 https://github.com/jjstwerff/loft.git /tmp/loft
          (cd /tmp/loft && cargo build --release --bin loft)

      - name: Add loft to PATH
        run: echo "/tmp/loft/target/release" >> "$GITHUB_PATH"

      - name: Interpreter — loft test
        working-directory: ${{ matrix.package }}
        run: loft --interpret test

      - name: Native — loft --native test
        working-directory: ${{ matrix.package }}
        run: loft --native test
