[package]
name = "random"
version = "0.1.0"
loft = ">=0.8"

[library]
entry = "src/random.loft"
native = "loft_random"

[native]
crate = "loft-random"

# @PLAN12 phase 3.5a (2026-05-24) — declarative source of truth
# for random's native symbols.  Walked by `tests/extraction_hygiene.rs`
# to auto-populate FORBIDDEN_LIBRARY_SYMBOLS, and by
# `src/parser/mod.rs::apply_manifest_side_effects` to route
# native codegen through `extern crate loft_random;` +
# `crate::n_<fn>(...)` qualified calls (same path as lib/crypto/).
# rand_indices flows through the new `loft::native_call::build_store`
# helper (added in same phase) so codegen can forward a LoftStore
# handle to the cdylib's store-allocating return.
[native.functions]
rand          = "n_rand"
rand_seed     = "n_rand_seed"
rand_indices  = "n_rand_indices"
