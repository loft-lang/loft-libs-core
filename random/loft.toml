[package]
name = "random"
version = "0.1.0"
loft = ">=0.8"

[library]
entry = "src/random.loft"
native = "loft_random"

[native]
crate = "loft-random"

# @PLAN12 Phase 6r (2026-05-29) — the `[native.functions]` manifest
# is superseded by the clean source-scan pattern: `native/build.rs`
# scans `src/*.loft` for bare `#native` annotations and generates the
# `loft_register!` list at compile time.  Defining a native function
# IS registering it — no parallel table to keep in sync.  See
# `native/build.rs` and the canonical reference at
# jjstwerff/loft `doc/claude/lib_plans/12-library-extraction/REFERENCE.md`
# § Clean libraries — the principle.
