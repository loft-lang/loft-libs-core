[package]
name = "crypto"
version = "0.2.0"
loft = ">=0.8"

[library]
entry = "src/crypto.loft"
native = "loft_crypto"

[native]
crate = "loft-crypto"

# @PLAN12 phase 2 (2026-05-24) — declarative source of truth for the
# library's native `n_*` symbols.  Walked by `tests/extraction_hygiene.rs`
# to auto-populate FORBIDDEN_LIBRARY_SYMBOLS.  Format:
#   loft_fn_name = "n_<symbol>"
# where `loft_fn_name` is the user-facing name in `src/<package>.loft`
# (without the `n_` prefix) and the value is the C-ABI symbol exported
# by `<crate>/src/lib.rs` via `loft_ffi::loft_register!`.
[native.functions]
sha256_native = "n_sha256"
hmac_sha256_native = "n_hmac_sha256"
base64_encode_native = "n_base64_encode"
base64_decode_native = "n_base64_decode"
base64url_encode_native = "n_base64url_encode"
