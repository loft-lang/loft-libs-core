[package]
name = "crypto"
version = "0.3.1"
loft = ">=0.8"
repository = "loft-libs-core"

[library]
entry = "src/crypto.loft"
native = "loft_crypto"

[native]
crate = "loft-crypto"

# Plan-74: native symbols are declared by co-located `#native "n_*"`
# annotations in `src/crypto.loft` (scanned by `loft-ffi-build`), so the
# register list lives in exactly one place — no `[native.functions]` table.
